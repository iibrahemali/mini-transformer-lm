model:
  block_size: 256
  n_embd: 384
  n_heads: 6
  n_layers: 6
  dropout: 0.2

training:
  batch_size: 64
  max_iters: 5000
  eval_interval: 500
  eval_iters: 100
  learning_rate: 3.0e-4
  min_lr: 3.0e-5
  warmup_iters: 100
  lr_decay_iters: 5000
  weight_decay: 0.1
  grad_clip: 1.0

data:
  dataset_path: "data/shakespeare.txt"
  train_split: 0.9
  tokenizer_type: "char"

checkpoint:
  dir: "checkpoints/char"
  save_interval: 1000

logging:
  log_file: "checkpoints/char/training_log.json"
